<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .main {
        padding: 2% 20%;
      }
      #abc {
        display: flex;
        width: 100%;
      }
      .part {
        display: flex;
        justify-content: space-around;
      }
     
      #gy {
        width: 6%;
        height: 6vh;
        margin-top: 2.5%;
      }
      #Maindiv {
        width: 55%;
        height: 80vh;
        margin: 5% 20%;
        border-radius: 25px;
      }      
      #FirstPage {
        height: 100%;
        width: 100%;
        display: flex;
        gap: 5%;
        align-items: center;
        justify-content: center;
        border-radius: 25px;
      }
      #SecondPage{
        height: 100%;
        width: 100%;
        gap: 5%;
        border-radius: 25px;
      }
      #SecondPage #Button{
        margin: 0.5%;
      }
      #FirstPage button {
        padding: 15px;
        width: 13%;
        background-color: red;
        color: white;
        font-size: 25px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }
      #gy {
        position: absolute;
        left: 22%;
        top: 10%;
      }
     #img1,#img2{
        width: 100%;
       }
      .last{
        margin-top: 10%;
      }
      #final{
        width: 100%;
      }
      @media(max-width:750px){
        
        #Maindiv{
          width: 87%;
           margin: 5% 5%;
        }
        #final{
          display: flex;
          justify-content: space-around;
          width: 100%;
          gap: 7%;
        }
        #gy{
          width: 15%;
          top: 6%;
          left: 13%;
        }
        #FirstPage{
         flex-wrap: wrap;
         gap: 1px;
             width: 100%;                                               
        }
        
        #FirstPage #Button{
          width: 35%;
          margin-top: 55%;
        }
        #reset{ padding: 6px;
          font-size: 30px;
          padding-bottom: 60% ;
        }
       
       .last #Button{
          margin-top: 55%;
         width: 10%;
          margin-left: 5%;
          gap: 20%;               
        } 
        #head{      
          font-size: 20px;
        }
        #SecondPage{
          font-size: 15px;
        }
        #re{
          font-size: 18px;
          margin-top: 1%;
        }
        #first{
          font-size: 18px;
        }
        #fi{
          font-size: 18px;
        }      
        #sec{
          font-size: 18px;
          margin-left: -50%;
        }
       .last{
        display: flex;
        flex-wrap: wrap;
        margin-left: -50%;
        justify-content: center;
        margin-top: 50%;
        gap: 10px;
        width: 23em;       
       }
      #para{
        margin-top:-15% ;
      }
      }
    </style>
  </head>
  <body style="font-size: 18px">
    <div id="Maindiv" style="background-color: #bebebe57; border: 1px solid #ff2f00; box-shadow: 1px 1px 15px red;">
      <img src="./assets/Images/moon_or.png" id="gy" onclick="toggleImage() " />
      <!-- ============================Frist Page Start=========================== -->
      <div id="FirstPage">
       
        <button onclick="SecondPageOpen()" id="Button" >PLAY</button>
        <h1 id="reset">
          Rock Paper Scissor<br />
          with computer
        </h1>
      </div>
      <!-- ============================Frist Page End=========================== -->
      <!-- ============================Second Page Start=========================== -->
      <div style="display: none" id="SecondPage">
        <div class="part">
          <h1
            style="text-align: center; font-weight: bolder; color: #1c1a4f"
            id="head"
          >
            Rock Paper Scissor with Computer
          </h1>

          
        </div>
        <h2 style="text-align: center; color: red;" id="re">RESET THE TOUR</h2>
        <div class="main">
          <div
            id="final"
            style="
              display: flex;
              font-size: 22px;
              justify-content: space-between;
              width: 130%;
              margin-left: -17%;
            "
          >
            <p id="first"></p>
            <p id="fi"></p>
          </div>
          <div class="" style="padding-left: 27%; width: 100%;">
            <p id="sec" style="color: red; padding-left:10% ; font-size: 20px;"></p>
          </div>

          <div id="abc" style="gap: 35px; margin-left: 17%; width: 70%; display: flex; justify-content: center;">
            <img src="" id="img2" style="width: 50%;" />
            <p id="para" style="padding-top: 50px"></p>
            <img src="" id="img1" style="width: 50%;" />
          </div>
          <div class="last" >
            <button
              id="Button"
              onclick="Click('Rock')"
              style="
                color: #fff;
                border: none;
                width: 22%;
                height: 5vh;
                background-color: red;
                border-radius: 20px;
                margin-left: 5%;
              "
            >
              Rock
            </button>
            <button
              id="Button"
              onclick="Click('Paper')"
              style="
                color: #fff;
                border: none;
                width: 22%;
                height: 5vh;
                background-color: red;
                border-radius: 20px;
              "
            >
              Paper
            </button>
            <button
              id="Button"
              onclick="Click('Scissor')"
              style="
                color: #fff;
                border: none;
                width: 22%;
                height: 5vh;
                background-color: red;
                border-radius: 20px;
              "
            >
              Scissor
            </button>
            <button
              id="Button"
              style="
                color: #fff;
                border: none;
                width: 22%;
                height: 5vh;
                background-color: red;
                border-radius: 20px;
              "
              onclick="FirstPageOpen()"
            >
              Back
            </button>
          </div>
        </div>
      </div>

      <!-- ============================Second Page End=========================== -->
    </div>
    <script src="./assets/Js/Game.js"></script>
  </body>
</html>
